<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わが家の共育シート - 入力＆集計フォーム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .input-percentage::-webkit-inner-spin-button,
        .input-percentage::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <header class="bg-[#24a8b4] text-white py-6 px-4 shadow-md text-center">
        <h1 class="text-2xl font-bold tracking-wider">共育シート 集計入力フォーム（わが家版）</h1>
        <p class="text-sm mt-2 opacity-90">各項目について、担当割合（合計100%）と心の負担度（1〜5）を入力してください。</p>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <div class="flex border-b border-slate-200 mb-6 bg-white rounded-t-lg shadow-sm overflow-hidden">
            <button id="btn-input" class="flex-1 py-4 text-center font-bold text-[#24a8b4] border-b-4 border-[#24a8b4] bg-slate-50 transition-all focus:outline-none">
                ① 入力シート
            </button>
            <button id="btn-result" class="flex-1 py-4 text-center font-bold text-slate-500 hover:text-slate-700 border-b-4 border-transparent transition-all focus:outline-none">
                ② 集計結果 & グラフ
            </button>
        </div>

        <div id="tab-input" class="space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
                <table class="w-full min-w-[900px] border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-slate-600">
                            <th class="p-3 text-left w-32" rowspan="2">カテゴリ</th>
                            <th class="p-3 text-left w-56" rowspan="2">家事・育児項目</th>
                            <th class="p-2 text-center bg-cyan-50/50" colspan="4">担当割合 (%)</th>
                            <th class="p-2 text-center bg-amber-50/50" colspan="3">心の負担度 (1〜5)</th>
                        </tr>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs text-slate-500">
                            <th class="p-2 text-center w-16 bg-cyan-50/30">パパ</th>
                            <th class="p-2 text-center w-16 bg-cyan-50/30">ママ</th>
                            <th class="p-2 text-center w-16 bg-cyan-50/30">子ども</th>
                            <th class="p-2 text-center w-20 bg-cyan-50/30">外注/第三者</th>
                            <th class="p-2 text-center w-16 bg-amber-50/30">パパ</th>
                            <th class="p-2 text-center w-16 bg-amber-50/30">ママ</th>
                            <th class="p-2 text-center w-16 bg-amber-50/30">子ども</th>
                        </tr>
                    </thead>
                    <tbody id="form-body">
                        </tbody>
                </table>
            </div>

            <div class="text-center pt-4">
                <button id="btn-submit" class="bg-[#24a8b4] hover:bg-[#1d8c96] text-white font-bold px-10 py-4 rounded-xl shadow-lg transition-all text-lg cursor-pointer">
                    集計結果とグラフを見る ➔
                </button>
            </div>
        </div>

        <div id="tab-result" class="hidden space-y-10">
            <div class="text-center max-w-xl mx-auto">
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">わが家の共育度</h2>
                <p class="text-slate-500 mt-1">トモイクシート集計結果より</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <h3 class="text-lg font-bold text-[#24a8b4] mb-1">① 担当割合</h3>
                    <p class="text-xs text-slate-400 mb-6">誰がどれだけ担っているか (%)</p>
                    <div class="w-full max-w-[400px] aspect-square">
                        <canvas id="chart-ratio"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <h3 class="text-lg font-bold text-[#e89451] mb-1">② 心の負担度</h3>
                    <p class="text-xs text-slate-400 mb-6">しんどさの感じ方 (1〜5)</p>
                    <div class="w-full max-w-[400px] aspect-square">
                        <canvas id="chart-burden"></canvas>
                    </div>
                </div>
            </div>

            <div class="text-center pt-4">
                <button id="btn-back" class="border-2 border-slate-300 hover:bg-slate-100 text-slate-600 font-bold px-8 py-3 rounded-xl transition-all cursor-pointer">
                    ⬅ 入力画面に戻る
                </button>
            </div>
        </div>

    </main>

    <script>
        const sheetData = [
            {
                category: "全体管理",
                items: ["スケジュール情報の共有・把握", "外部との調整"]
            },
            {
                category: "食事",
                items: ["朝食の支度・片付け", "昼食（お弁当）の支度・片付け", "夕食の支度・片付け"]
            },
            {
                category: "その他家事",
                items: ["洗濯（洗う・干す・たたむ・しまう）", "掃除（リビング・キッチン・洗面・お風呂・トイレ）", "買い出し", "ゴミ出し（回収・分別・出す）"]
            },
            {
                category: "育児",
                items: ["ミルクや離乳食の支度・片付け", "子どもの沐浴・入浴", "おむつ交換", "保育園・幼稚園・学校への送迎", "保育園・幼稚園・学校の持ち物準備", "保育園・幼稚園・学校への身支度補助", "遊ぶ（外遊び・散歩・家の中）", "通院"]
            }
        ];


        const defaultValues = {
            "スケジュール情報の共有・把握": { r_p: 20, r_m: 80, r_c: 0, r_o: 0, b_p: 2, b_m: 4, b_c: 1 },
            "外部との調整":                   { r_p: 40, r_m: 50, r_c: 0, r_o: 10, b_p: 2, b_m: 3, b_c: 1 },
            "朝食の支度・片付け":             { r_p: 20, r_m: 80, r_c: 0, r_o: 0, b_p: 2, b_m: 4, b_c: 1 },
            "昼食（お弁当）の支度・片付け":   { r_p: 10, r_m: 70, r_c: 0, r_o: 20, b_p: 1, b_m: 3, b_c: 1 },
            "夕食の支度・片付け":             { r_p: 30, r_m: 70, r_c: 0, r_o: 0, b_p: 2, b_m: 4, b_c: 1 },
            "洗濯（洗う・干す・たたむ・しまう）": { r_p: 30, r_m: 60, r_c: 10, r_o: 0, b_p: 2, b_m: 3, b_c: 1 },
            "掃除（リビング・キッチン・洗面・お風呂・トイレ）": { r_p: 40, r_m: 55, r_c: 5, r_o: 0, b_p: 3, b_m: 3, b_c: 1 },
            "買い出し":                       { r_p: 20, r_m: 60, r_c: 0, r_o: 20, b_p: 2, b_m: 3, b_c: 1 },
            "ゴミ出し（回収・分別・出す）":   { r_p: 70, r_m: 30, r_c: 0, r_o: 0, b_p: 3, b_m: 2, b_c: 1 },
            "ミルクや離乳食の支度・片付け":   { r_p: 20, r_m: 80, r_c: 0, r_o: 0, b_p: 1, b_m: 3, b_c: 1 },
            "子どもの沐浴・入浴":             { r_p: 50, r_m: 50, r_c: 0, r_o: 0, b_p: 3, b_m: 3, b_c: 1 },
            "おむつ交換":                     { r_p: 40, r_m: 60, r_c: 0, r_o: 0, b_p: 2, b_m: 3, b_c: 1 },
            "保育園・幼稚園・学校への送迎":   { r_p: 60, r_m: 40, r_c: 0, r_o: 0, b_p: 2, b_m: 3, b_c: 1 },
            "保育園・幼稚園・学校の持ち物準備": { r_p: 10, r_m: 70, r_c: 20, r_o: 0, b_p: 1, b_m: 3, b_c: 2 },
            "保育園・幼稚園・学校への身支度補助": { r_p: 30, r_m: 60, r_c: 10, r_o: 0, b_p: 2, b_m: 3, b_c: 1 },
            "遊ぶ（外遊び・散歩・家の中）":   { r_p: 50, r_m: 40, r_c: 10, r_o: 0, b_p: 3, b_m: 3, b_c: 2 },
            "通院":                           { r_p: 40, r_m: 60, r_c: 0, r_o: 0, b_p: 2, b_m: 3, b_c: 1 }
        };

        const formBody = document.getElementById('form-body');
        let itemIndex = 0;

        sheetData.forEach(catGroup => {
            catGroup.items.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50/50 text-slate-700";
                tr.dataset.category = catGroup.category;
                tr.dataset.item = item;

                let catCell = '';
                if(idx === 0) {
                    catCell = `<td class="p-3 font-bold text-slate-600 bg-slate-50/80 border-r border-slate-200" rowspan="${catGroup.items.length}">${catGroup.category}</td>`;
                }

                const d = defaultValues[item] || { r_p: 0, r_m: 0, r_c: 0, r_o: 0, b_p: 1, b_m: 1, b_c: 1 };

                tr.innerHTML = `
                    ${catCell}
                    <td class="p-3 font-medium border-r border-slate-100">${item}</td>
                    <td class="p-1 bg-cyan-50/10"><input type="number" value="${d.r_p}" class="w-full text-center p-1 border border-slate-200 rounded input-percentage font-semibold text-cyan-700 focus:border-cyan-500 focus:outline-none" data-role="r_p"></td>
                    <td class="p-1 bg-cyan-50/10"><input type="number" value="${d.r_m}" class="w-full text-center p-1 border border-slate-200 rounded input-percentage font-semibold text-cyan-700 focus:border-cyan-500 focus:outline-none" data-role="r_m"></td>
                    <td class="p-1 bg-cyan-50/10"><input type="number" value="${d.r_c}" class="w-full text-center p-1 border border-slate-200 rounded input-percentage font-semibold text-cyan-700 focus:border-cyan-500 focus:outline-none" data-role="r_c"></td>
                    <td class="p-1 bg-cyan-50/10 border-r border-slate-200"><input type="number" value="${d.r_o}" class="w-full text-center p-1 border border-slate-200 rounded input-percentage font-semibold text-emerald-700 focus:border-emerald-500 focus:outline-none" data-role="r_o"></td>
                    <td class="p-1 bg-amber-50/10">
                        <select class="w-full text-center p-1 border border-slate-200 rounded focus:border-amber-500 focus:outline-none text-amber-800 font-medium" data-role="b_p">
                            ${[1,2,3,4,5].map(v => `<option value="${v}" ${d.b_p===v?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-1 bg-amber-50/10">
                        <select class="w-full text-center p-1 border border-slate-200 rounded focus:border-amber-500 focus:outline-none text-amber-800 font-medium" data-role="b_m">
                            ${[1,2,3,4,5].map(v => `<option value="${v}" ${d.b_m===v?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-1 bg-amber-50/10">
                        <select class="w-full text-center p-1 border border-slate-200 rounded focus:border-amber-500 focus:outline-none text-amber-800 font-medium" data-role="b_c">
                            ${[1,2,3,4,5].map(v => `<option value="${v}" ${d.b_c===v?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </td>
                `;
                formBody.appendChild(tr);
            });
        });

        const btnInput = document.getElementById('btn-input');
        const btnResult = document.getElementById('btn-result');
        const tabInput = document.getElementById('tab-input');
        const tabResult = document.getElementById('tab-result');

        function switchTab(toResult) {
            if(toResult) {
                tabInput.classList.add('hidden');
                tabResult.classList.remove('hidden');
                btnResult.className = "flex-1 py-4 text-center font-bold text-[#24a8b4] border-b-4 border-[#24a8b4] bg-slate-50 transition-all focus:outline-none";
                btnInput.className = "flex-1 py-4 text-center font-bold text-slate-500 hover:text-slate-700 border-b-4 border-transparent transition-all focus:outline-none";
                calculateAndRenderCharts();
            } else {
                tabResult.classList.add('hidden');
                tabInput.classList.remove('hidden');
                btnInput.className = "flex-1 py-4 text-center font-bold text-[#24a8b4] border-b-4 border-[#24a8b4] bg-slate-50 transition-all focus:outline-none";
                btnResult.className = "flex-1 py-4 text-center font-bold text-slate-500 hover:text-slate-700 border-b-4 border-transparent transition-all focus:outline-none";
            }
        }

        btnInput.addEventListener('click', () => switchTab(false));
        btnResult.addEventListener('click', () => switchTab(true));
        document.getElementById('btn-submit').addEventListener('click', () => switchTab(true));
        document.getElementById('btn-back').addEventListener('click', () => switchTab(false));

        let chartRatioInstance = null;
        let chartBurdenInstance = null;
        function calculateAndRenderCharts() {
            const categories = ["全体管理", "食事", "その他家事", "育児"];
            const summary = {};
            categories.forEach(c => {
                summary[c] = {
                    r_p: 0, r_m: 0, r_c: 0, r_o: 0,
                    b_p: 0, b_m: 0, b_c: 0,
                    count: 0
                };
            });

            const rows = formBody.querySelectorAll('tr');
            rows.forEach(row => {
                const cat = row.dataset.category;
                const r_p = parseFloat(row.querySelector('[data-role="r_p"]').value) || 0;
                const r_m = parseFloat(row.querySelector('[data-role="r_m"]').value) || 0;
                const r_c = parseFloat(row.querySelector('[data-role="r_c"]').value) || 0;
                const r_o = parseFloat(row.querySelector('[data-role="r_o"]').value) || 0;

                const b_p = parseFloat(row.querySelector('[data-role="b_p"]').value) || 1;
                const b_m = parseFloat(row.querySelector('[data-role="b_m"]').value) || 1;
                const b_c = parseFloat(row.querySelector('[data-role="b_c"]').value) || 1;

                summary[cat].r_p += r_p;
                summary[cat].r_m += r_m;
                summary[cat].r_c += r_c;
                summary[cat].r_o += r_o;

                summary[cat].b_p += b_p;
                summary[cat].b_m += b_m;
                summary[cat].b_c += b_c;

                summary[cat].count += 1;
            });

            const dataRatio = { p: [], m: [], c: [], o: [] };
            const dataBurden = { p: [], m: [], c: [] };

            categories.forEach(c => {
                const s = summary[c];
                dataRatio.p.push((s.r_p / s.count).toFixed(1));
                dataRatio.m.push((s.r_m / s.count).toFixed(1));
                dataRatio.c.push((s.r_c / s.count).toFixed(1));
                dataRatio.o.push((s.r_o / s.count).toFixed(1));

                dataBurden.p.push((s.b_p / s.count).toFixed(1));
                dataBurden.m.push((s.b_m / s.count).toFixed(1));
                dataBurden.c.push((s.b_c / s.count).toFixed(1));
            });

            if(chartRatioInstance) chartRatioInstance.destroy();
            const ctxRatio = document.getElementById('chart-ratio').getContext('2d');
            chartRatioInstance = new Chart(ctxRatio, {
                type: 'radar',
                data: {
                    labels: categories,
                    datasets: [
                        { label: 'パパ', data: dataRatio.p, borderColor: '#1cb0bc', backgroundColor: 'rgba(28, 176, 188, 0.1)', borderWidth: 2, pointBackgroundColor: '#1cb0bc' },
                        { label: 'ママ', data: dataRatio.m, borderColor: '#e89451', backgroundColor: 'rgba(232, 148, 81, 0.1)', borderWidth: 2, pointBackgroundColor: '#e89451' },
                        { label: '子ども', data: dataRatio.c, borderColor: '#94a3b8', backgroundColor: 'rgba(148, 163, 184, 0.05)', borderWidth: 2, pointBackgroundColor: '#94a3b8' },
                        { label: '外注/第三者', data: dataRatio.o, borderColor: '#65a30d', backgroundColor: 'rgba(101, 163, 13, 0.05)', borderWidth: 2, pointBackgroundColor: '#65a30d' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 }, pointLabels: { font: { size: 13, weight: 'bold' } } } },
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { weight: 'bold' } } } }
                }
            });

            if(chartBurdenInstance) chartBurdenInstance.destroy();
            const ctxBurden = document.getElementById('chart-burden').getContext('2d');
            chartBurdenInstance = new Chart(ctxBurden, {
                type: 'radar',
                data: {
                    labels: categories,
                    datasets: [
                        { label: 'パパ', data: dataBurden.p, borderColor: '#1cb0bc', backgroundColor: 'rgba(28, 176, 188, 0.1)', borderWidth: 2, pointBackgroundColor: '#1cb0bc' },
                        { label: 'ママ', data: dataBurden.m, borderColor: '#e89451', backgroundColor: 'rgba(232, 148, 81, 0.1)', borderWidth: 2, pointBackgroundColor: '#e89451' },
                        { label: '子ども', data: dataBurden.c, borderColor: '#94a3b8', backgroundColor: 'rgba(148, 163, 184, 0.05)', borderWidth: 2, pointBackgroundColor: '#94a3b8' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { r: { min: 0, max: 5, ticks: { stepSize: 1 }, pointLabels: { font: { size: 13, weight: 'bold' } } } },
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { weight: 'bold' } } } }
                }
            });
        }
    </script>
</body>
</html>
